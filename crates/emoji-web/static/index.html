<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Ultramoji Viewer 4D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: stretch;
  }
  canvas {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  button, input { font: inherit; }
  #loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #50b4ff; font-family: monospace; font-size: 18px;
  }
  #mobile-keypad {
    --keypad-green: #00ff66;
    --keypad-dim: #008c3b;
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 1fr;
    gap: 6px;
    width: min(100%, 520px);
    margin: 0 auto;
    padding: 6px max(6px, env(safe-area-inset-right)) max(6px, env(safe-area-inset-bottom)) max(6px, env(safe-area-inset-left));
    background: #000;
    color: var(--keypad-green);
    font-family: "Glass TTY VT220", "Courier New", monospace;
    text-transform: uppercase;
    touch-action: manipulation;
    user-select: none;
  }
  .keypad-pad {
    display: grid;
    grid-template-columns: repeat(3, minmax(42px, 1fr));
    grid-template-rows: repeat(3, 42px);
    gap: 5px;
  }
  .keypad-search {
    display: grid;
    min-width: 0;
  }
  .keypad-button {
    min-width: 0;
    min-height: 0;
    border: 1px solid var(--keypad-dim);
    border-radius: 0;
    background: #000;
    color: var(--keypad-green);
    letter-spacing: 0;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .keypad-combo {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px;
  }
  .keypad-combo.keypad-d-hidden {
    grid-template-columns: 1fr;
  }
  .keypad-combo .keypad-button {
    min-width: 0;
  }
  .keypad-small .keypad-key {
    font-size: 9px;
  }
  .keypad-small .keypad-action {
    font-size: 7px;
  }
  .keypad-button:active {
    background: #003915;
    color: var(--keypad-green);
    transform: translateY(1px);
  }
  .keypad-button[disabled] {
    color: #00672b;
    border-color: #00431d;
    background: #000;
    cursor: default;
    transform: none;
  }
  .keypad-hidden { display: none; }
  .keypad-key,
  .keypad-action {
    display: block;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 0 4px;
  }
  .keypad-key {
    color: var(--keypad-green);
    font-size: 11px;
    line-height: 1.15;
  }
  .keypad-action {
    color: var(--keypad-dim);
    font-size: 8px;
    line-height: 1.2;
  }
  #keypad-search-input {
    min-width: 0;
    height: 100%;
    min-height: 42px;
    border: 1px solid var(--keypad-dim);
    border-radius: 0;
    padding: 0 9px;
    background: #000;
    color: var(--keypad-green);
    outline: none;
    caret-color: var(--keypad-green);
  }
  #keypad-search-input::placeholder { color: #00672b; }
  #keypad-search-input:focus {
    border-color: var(--keypad-green);
  }
  @media (max-width: 640px) {
    #mobile-keypad {
      width: 100%;
      gap: 5px;
    }
    .keypad-pad {
      grid-template-columns: repeat(3, minmax(34px, 1fr));
      grid-template-rows: repeat(3, 36px);
      gap: 4px;
    }
    #keypad-search-input {
      min-height: 36px;
    }
  }
  @media (max-height: 520px) {
    #mobile-keypad {
      padding-top: 4px;
    }
    .keypad-pad {
      grid-template-rows: repeat(3, 32px);
    }
    #keypad-search-input {
      min-height: 32px;
    }
  }
</style>
</head>
<body>
<div id="loading">Initializing WebGPU...</div>
<canvas id="emoji-canvas"></canvas>
<script src="/slack-config.js"></script>
<script type="module">
const loadingEl = document.getElementById('loading');
const DEFAULT_ASSET_MANIFEST = {
  'slack_hosted.js': '',
  'pkg/emoji_web.js': '',
  'pkg/emoji_web_bg.wasm': '',
};

function showStartupError(message) {
  if (!loadingEl) return;
  loadingEl.textContent = message;
  loadingEl.style.color = '#ff8a65';
  loadingEl.style.padding = '24px';
  loadingEl.style.textAlign = 'left';
  loadingEl.style.whiteSpace = 'pre-wrap';
}

async function loadAssetManifest() {
  try {
    const response = await fetch('/asset-manifest.json', {
      cache: 'no-store',
      credentials: 'same-origin',
    });
    if (!response.ok) return DEFAULT_ASSET_MANIFEST;
    return { ...DEFAULT_ASSET_MANIFEST, ...(await response.json()) };
  } catch {
    return DEFAULT_ASSET_MANIFEST;
  }
}

function versionedAssetUrl(manifest, path) {
  const version = manifest[path];
  return version ? `/${path}?v=${encodeURIComponent(version)}` : `/${path}`;
}

function chooseRenderConfigDefaults() {
  const dpr = Math.max(1, window.devicePixelRatio || 1);
  const deviceMemory = Number(navigator.deviceMemory || 0);
  const lowMemory = deviceMemory > 0 && deviceMemory <= 4;
  const highDpr = dpr >= 1.75;
  return {
    galleryCanvasScale: highDpr || lowMemory ? 0.75 : 1.0,
    previewCanvasScale: highDpr || lowMemory ? 0.75 : 1.0,
    previewMaxDim: lowMemory ? 256 : 320,
    previewRenderScale: 2.0,
    displayPixelated: false,
    overlayFilter: false,
  };
}

try {
  const assetManifest = await loadAssetManifest();
  const hostedModule = await import(versionedAssetUrl(assetManifest, 'slack_hosted.js'));
  const { bootHostedEmojiApp } = hostedModule;
  const wasmModule = await import(versionedAssetUrl(assetManifest, 'pkg/emoji_web.js'));
  const {
    default: init,
    clear_active_emoji_texture,
    clear_decoded_emoji_texture_cache,
    current_emoji_name,
    current_keypad_mode,
    current_preview_emoji_name,
    current_search_query,
    next_preview_emoji_name,
    preload_emoji_texture_bytes,
    previous_preview_emoji_name,
    set_active_emoji_texture_error,
    set_active_emoji_texture_from_cache,
    sign_out_request_nonce,
    set_active_emoji_texture_bytes,
    set_gallery_entries,
    set_hosted_auth_state,
    set_ambient_light_config,
    set_perf_toggles,
    set_render_config,
    set_shadow_render_config,
    set_route_state,
    set_transfer_tuning,
  } = wasmModule;
  await init(versionedAssetUrl(assetManifest, 'pkg/emoji_web_bg.wasm'));
  loadingEl?.remove();
  const defaultRenderConfig = chooseRenderConfigDefaults();
  set_render_config(
    defaultRenderConfig.galleryCanvasScale,
    defaultRenderConfig.previewCanvasScale,
    defaultRenderConfig.previewMaxDim,
    defaultRenderConfig.previewRenderScale,
    defaultRenderConfig.displayPixelated,
    defaultRenderConfig.overlayFilter,
  );

  window.__emojiPerfControls = {
    setToggles({ crt = true, transfer = true, overlayFilter = true, billboard = true } = {}) {
      set_perf_toggles(crt, transfer, overlayFilter, billboard);
    },
    setRenderConfig({
      galleryCanvasScale = defaultRenderConfig.galleryCanvasScale,
      previewCanvasScale = defaultRenderConfig.previewCanvasScale,
      previewMaxDim = defaultRenderConfig.previewMaxDim,
      previewRenderScale = defaultRenderConfig.previewRenderScale,
      displayPixelated = defaultRenderConfig.displayPixelated,
      overlayFilter = defaultRenderConfig.overlayFilter,
    } = {}) {
      set_render_config(
        galleryCanvasScale,
        previewCanvasScale,
        previewMaxDim,
        previewRenderScale,
        displayPixelated,
        overlayFilter,
      );
    },
    setShadow({
      mode = 1,
      strength = 1.0,
      maxDarkness = 1.0,
      contact = true,
      bins = 96,
      resolution = 256,
    } = {}) {
      set_shadow_render_config(mode, strength, maxDarkness, contact, bins, resolution);
    },
    setAmbient({
      tint = 0.67,
      brightness = 0.11,
    } = {}) {
      set_ambient_light_config(tint, brightness);
    },
    setTransfer({
      linearGain = 1.15,
      gamma = 1.0,
      lift = -0.05,
      saturation = 1.25,
    } = {}) {
      set_transfer_tuning(linearGain, gamma, lift, saturation);
    },
  };

  await bootHostedEmojiApp({
    clear_active_emoji_texture,
    clear_decoded_emoji_texture_cache,
    current_emoji_name,
    current_keypad_mode,
    current_preview_emoji_name,
    current_search_query,
    next_preview_emoji_name,
    preload_emoji_texture_bytes,
    previous_preview_emoji_name,
    set_active_emoji_texture_error,
    set_active_emoji_texture_from_cache,
    sign_out_request_nonce,
    set_active_emoji_texture_bytes,
    set_gallery_entries,
    set_hosted_auth_state,
    set_route_state,
  });
} catch (err) {
  console.error('startup failed', err);
  showStartupError(`Startup failed.\n${err}`);
}
</script>
</body>
</html>
