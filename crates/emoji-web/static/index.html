<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
    <title>Ultramoji Viewer 4D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #0c121c; }
  canvas { width: 100%; height: 100%; display: block; }
  #loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: #50b4ff; font-family: monospace; font-size: 18px;
  }
</style>
</head>
<body>
<div id="loading">Initializing WebGPU...</div>
<canvas id="emoji-canvas"></canvas>
<script src="./slack-config.js"></script>
<script type="module">
const BUILD_TAG = '2026-04-23l';
const loadingEl = document.getElementById('loading');

function showStartupError(message) {
  if (!loadingEl) return;
  loadingEl.textContent = message;
  loadingEl.style.color = '#ff8a65';
  loadingEl.style.padding = '24px';
  loadingEl.style.textAlign = 'left';
  loadingEl.style.whiteSpace = 'pre-wrap';
}

try {
  const hostedModule = await import(`./slack_hosted.js?v=${BUILD_TAG}`);
  const { bootHostedEmojiApp } = hostedModule;
  const wasmModule = await import(`./pkg/emoji_web.js?v=${BUILD_TAG}`);
  const {
    default: init,
    clear_active_emoji_texture,
    current_emoji_name,
    set_active_emoji_texture_error,
    sign_out_request_nonce,
    set_active_emoji_texture_bytes,
    set_gallery_entries,
    set_hosted_auth_state,
    set_perf_toggles,
    set_render_config,
    set_transfer_tuning,
  } = wasmModule;
  await init(`./pkg/emoji_web_bg.wasm?v=${BUILD_TAG}`);
  loadingEl?.remove();

  window.__emojiPerfControls = {
    setToggles({ crt = true, transfer = true, overlayFilter = true, billboard = true } = {}) {
      set_perf_toggles(crt, transfer, overlayFilter, billboard);
    },
    setRenderConfig({
      galleryCanvasScale = 1.0,
      previewCanvasScale = 1.0,
      previewMaxDim = 320,
      previewRenderScale = 2.0,
      displayPixelated = false,
      overlayFilter = false,
    } = {}) {
      set_render_config(
        galleryCanvasScale,
        previewCanvasScale,
        previewMaxDim,
        previewRenderScale,
        displayPixelated,
        overlayFilter,
      );
    },
    setTransfer({
      linearGain = 1.15,
      gamma = 1.0,
      lift = -0.05,
      saturation = 1.25,
    } = {}) {
      set_transfer_tuning(linearGain, gamma, lift, saturation);
    },
  };

  await bootHostedEmojiApp({
    clear_active_emoji_texture,
    current_emoji_name,
    set_active_emoji_texture_error,
    sign_out_request_nonce,
    set_active_emoji_texture_bytes,
    set_gallery_entries,
    set_hosted_auth_state,
  });
} catch (err) {
  console.error('startup failed', err);
  showStartupError(`Startup failed.\n${err}`);
}
</script>
</body>
</html>
